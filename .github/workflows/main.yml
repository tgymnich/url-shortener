name: Deploy

on:
  # push:
  #   branches:
  #     - master
  # pull_request:
  workflow_dispatch:

jobs:
  deploy:
    environment:
      name: production
      url: https://fwd.gymni.ch
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
